name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name clearocr-app `
            --icon=clearocr_app/clearocr_app_favicon.ico `
            --add-data "clearocr_app/clearocr_app_logo.png;clearocr_app" `
            clearocr_app/__main__.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: clearocr-app-windows
          path: dist/clearocr-app.exe
